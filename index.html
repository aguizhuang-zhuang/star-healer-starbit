    border:2px solid rgba(0,229,255,.5);
    box-shadow: 0 0 24px rgba(0,229,255,.35), inset 0 0 20px rgba(0,229,255,.16);
    pointer-events:none; opacity:0; transform:scale(.7); transition: opacity .12s ease, transform .12s ease; }
  #joystick.on { opacity:1; transform:scale(1); }
  #knob { position:absolute; left:50%; top:50%; width:58px; height:58px; margin:-29px 0 0 -29px; border-radius:50%;

  #actionBtn { position:absolute; right:30px; bottom:46px; width:98px; height:98px; border-radius:50%;

  #startBtn:active { transform:scale(.96); }

<script>
/* =====================================================================
   星际治愈者：星崽 — Chapter 1 垂直切片原型 (HTML5 Canvas)
   基于《星际治愈者 IP 设计手册》与《游戏设计文档 v1.0》
   纯前端、无外部依赖。
   ===================================================================== */

const COL = {
  deep:   '#1A1A3E', // 深空蓝
  nebula: '#4B2D8B', // 星云紫
  cyan:   '#00E5FF', // 霓虹青
  pink:   '#FF2D78', // 电光粉
  yellow: '#FFD740', // 暖月黄
  white:  '#F5F0FF', // 星光白
  gray:   '#2A2A4A', // 暗物质灰
  orange: '#FF8A50'  // 暖橙（烧烤摊用，办公室点缀）
};

/* ---------- 工具函数 ---------- */
function clamp(v, a, b){ return v < a ? a : (v > b ? b : v); }
function lerp(a, b, t){ return a + (b - a) * t; }
function dist(ax, ay, bx, by){ return Math.hypot(ax - bx, ay - by); }
function rand(a, b){ return a + Math.random() * (b - a); }

function hexToRgb(h){
  h = h.replace('#','');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}
function rgbStr(c, a){ return a===undefined ? `rgb(${c[0]|0},${c[1]|0},${c[2]|0})` : `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`; }
function mixRgb(c1, c2, t){ return [lerp(c1[0],c2[0],t), lerp(c1[1],c2[1],t), lerp(c1[2],c2[2],t)]; }
function rgbaStr(hex, a){ return `rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${a})`; }
// 灰蓝化（未转化状态：饱和度低、偏灰蓝）
function grayify(c){
  const l = 0.299*c[0] + 0.587*c[1] + 0.114*c[2];
  return [clamp(l*0.62 + 26, 0, 255), clamp(l*0.62 + 28, 0, 255), clamp(l*0.62 + 52, 0, 255)];
}

/* ---------- 霓虹混搭风格开关与发光辅助（仿 PAC·MAN 3D 的发光街机语言） ---------- */
const NEON = true;
function setGlow(color, blur){ ctx.shadowColor = color; ctx.shadowBlur = blur; }
function clearGlow(){ ctx.shadowBlur = 0; }

/* ---------- 极简音频（WebAudio，无外部资源） ---------- */
const Audio2 = {
  ctx: null,
  init(){ if(!this.ctx){ try { this.ctx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} } },
  tone(freq, dur, type, vol, when){
    if(!this.ctx) return;
    const t = this.ctx.currentTime + (when||0);
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type||'sine';
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol||0.15, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t+dur+0.02);
  },
  chime(){ this.tone(880, 0.5, 'sine', 0.18); this.tone(1318, 0.6, 'sine', 0.12, 0.08); },
  candy(){ this.tone(1568, 0.18, 'triangle', 0.12); },
  detect(){ this.tone(110, 0.4, 'sine', 0.06); },
  absorbStep(){ this.tone(420, 0.12, 'sawtooth', 0.05); },
  beat(){ this.tone(660, 0.1, 'square', 0.08); },
  heal(){ this.tone(523,0.5,'sine',0.16); this.tone(784,0.6,'sine',0.12,0.1); this.tone(1046,0.7,'sine',0.1,0.2); }
};

/* ---------- 画布 ---------- */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize(){
  DPR = window.devicePixelRatio || 1;
  W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);

/* ---------- 星崽 IP 图片加载 ---------- */
const starbitImg = new Image();
starbitImg.src = (typeof STARBIT_DATA_URI !== 'undefined') ? STARBIT_DATA_URI : 'starbit.png';
let imgReady = false;
starbitImg.onload = function(){ imgReady = true; };
starbitImg.onerror = function(){ /* 图片不可用时回退到绘制模式 */ imgReady = false; };

/* ---------- 场景概念图（AI 生成，Chapter 1 深夜办公室） ---------- */
const sceneImg = new Image();
sceneImg.src = (typeof SCENE_DATA_URI !== 'undefined') ? SCENE_DATA_URI : 'scene.png';
let sceneReady = false;
sceneImg.onload = function(){ sceneReady = true; };
sceneImg.onerror = function(){ sceneReady = false; };

/* ---------- 星崽待机动画（AI 生成，图生视频） ---------- */
const charVideo = document.createElement('video');
charVideo.src = (typeof CHARVIDEO_DATA_URI !== 'undefined') ? CHARVIDEO_DATA_URI : 'starbit_anim.mp4';
charVideo.loop = true; charVideo.muted = true; charVideo.playsInline = true; charVideo.autoplay = true;
charVideo.setAttribute('playsinline',''); charVideo.setAttribute('muted','');
charVideo.play().catch(function(){});
let charVideoReady = false;
charVideo.addEventListener('loadeddata', function(){ charVideoReady = true; });
function tryPlayCharVideo(){ charVideo.play().catch(function(){}); }

// 把图片以 cover 方式铺满指定矩形（保持比例、居中裁剪）
function drawImageCover(img, x, y, w, h){
  const iw = img.naturalWidth, ih = img.naturalHeight;
  if(!iw || !ih) return;
  const scale = Math.max(w/iw, h/ih);
  const dw = iw*scale, dh = ih*scale;
  const dx = x + (w-dw)/2, dy = y + (h-dh)/2;
  ctx.drawImage(img, dx, dy, dw, dh);
}

/* ---------- 输入 ---------- */
const keys = {};
const justPressed = {};
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(k)) e.preventDefault();
  if(!keys[k]) justPressed[k] = true;
  keys[k] = true;
  Audio2.init();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
canvas.addEventListener('mousedown', e => {
  Audio2.init();
  mouse.x = e.offsetX; mouse.y = e.offsetY;
  if(game && (game.state==='title'||game.state==='diary'||game.state==='cutscene')){
    if(window.__startGame) window.__startGame();
    return;
  }
  mouse.clicked = true;
});
const mouse = { x:0, y:0, clicked:false };

/* ---------- 触屏输入（手机端 · 浮动摇杆） ---------- */
const touch = {
  active: false,        // 摇杆是否在用
  id: null,             // 当前操控摇杆的手指 identifier
  ax: 0, ay: 0,         // 平滑后的归一化方向向量（-1..1，长度=推力大小）
  tAx: 0, tAy: 0,       // 手指实时目标方向
  knobX: 0, knobY: 0,   // 平滑后的摇杆头偏移
  tKx: 0, tKy: 0,       // 摇杆头目标偏移
  baseX: 0, baseY: 0,   // 摇杆底座中心（落指处）
  confirm: false,
  confirmHeld: false,   // 吸收按钮是否按住（长按型）
  isTouch: ('ontouchstart' in window) || navigator.maxTouchPoints > 0
};
const JOY_MAX = 62;   // 摇杆最大半径(px)
const JOY_DEAD = 14;  // 死区(px)
function touchConfirm(){
  if(!game) return;
  if(game.state==='title' || game.state==='diary' || game.state==='cutscene'){
    if(window.__startGame) window.__startGame();
  } else {
    justPressed[' '] = true; // 与键盘空格等价
  }
}
function touchHold(on){ touch.confirmHeld = on; }

// 摇杆 UI 元素（由 index.html 提供）
let joystickEl, knobEl, actionEl;
function showJoystick(x,y){
  if(!joystickEl) return;
  joystickEl.style.left = x+'px';
  joystickEl.style.top = y+'px';
  joystickEl.classList.add('on');
  touch.knobX = 0; touch.knobY = 0;        // 落指瞬间摇杆头归位中心
  if(knobEl) knobEl.style.transform = 'translate(0,0)';
}
function hideJoystick(){
  if(!joystickEl) return;
  joystickEl.classList.remove('on');
}
function joyStart(x,y,id){
  touch.baseX = x; touch.baseY = y;
  touch.active = true; touch.id = id;
  showJoystick(x,y);
  joyMove(x,y);
}
function joyMove(x,y){
  let dx = x - touch.baseX, dy = y - touch.baseY;
  const len = Math.hypot(dx,dy) || 1;
  if(len < JOY_DEAD){ touch.tAx=0; touch.tAy=0; touch.tKx=0; touch.tKy=0; return; }
  const cl = Math.min(len, JOY_MAX);
  const ux = dx/len, uy = dy/len;
  touch.tKx = ux*cl; touch.tKy = uy*cl;
  touch.tAx = ux*cl/JOY_MAX; touch.tAy = uy*cl/JOY_MAX;
}
function joyEnd(){
  touch.active = false; touch.id = null;
  touch.tAx = touch.tAy = touch.tKx = touch.tKy = 0;
  hideJoystick();
}

function setupTouchUI(){
  joystickEl = document.getElementById('joystick');
  knobEl = document.getElementById('knob');
  actionEl = document.getElementById('actionBtn');

  // 画布触摸层：游戏中任意落指即生成浮动摇杆；标题/过场/日记页任意点击推进
  if(canvas){
    canvas.addEventListener('touchstart', e=>{
      e.preventDefault();
      Audio2.init();
      const st = game ? game.state : 'title';
      if(st !== 'play'){
        if(st==='title'||st==='diary'||st==='cutscene') touchConfirm();
        return;
      }
      for(const t of e.changedTouches){
        // 避免与右下吸收按钮区域冲突
        if(actionEl){
          const r = actionEl.getBoundingClientRect();
          if(t.clientX>=r.left && t.clientX<=r.right && t.clientY>=r.top && t.clientY<=r.bottom) continue;
        }
        joyStart(t.clientX, t.clientY, t.identifier);
      }
    }, {passive:false});
    canvas.addEventListener('touchmove', e=>{
      e.preventDefault();
      if(!touch.active) return;
      for(const t of e.changedTouches){ if(t.identifier===touch.id) joyMove(t.clientX, t.clientY); }
    }, {passive:false});
    const endTouch = e=>{
      e.preventDefault();
      for(const t of e.changedTouches){ if(t.identifier===touch.id) joyEnd(); }
    };
    canvas.addEventListener('touchend', endTouch, {passive:false});
    canvas.addEventListener('touchcancel', endTouch, {passive:false});
  }

  if(actionEl){
    actionEl.addEventListener('touchstart', e=>{ e.preventDefault(); touchConfirm(); touchHold(true); actionEl.classList.add('pressed'); }, {passive:false});
    const up = e=>{ e.preventDefault(); touchHold(false); actionEl.classList.remove('pressed'); };
    actionEl.addEventListener('touchend', up, {passive:false});
    actionEl.addEventListener('touchcancel', up, {passive:false});
  }
}


/* ---------- 关卡数据：深夜办公室 ---------- */
const ROOM = { x:0, y:0, w:1760, h:1120 };
const AURA_R = 230; // 星崽暖光扩散半径

let solids = [];      // 碰撞矩形（桌、墙）
let furn = [];        // 家具（可上色对象）
let sources = [];     // 负能量源
let candies = [];     // 星星糖
let moments = [];     // 美好瞬间
let particles = [];

let starbit, cam, game;
let starbitTrail = [];   // 星崽移动光迹（霓虹拖尾）

function buildLevel(){
  solids = [];
  furn = [];
  sources = [];
  candies = [];
  moments = [];
  particles = [];
  starbitTrail = [];

  // 墙体（仅作为边界，不单独画 solid，边界在移动里 clamp）
  // 办公桌（实体碰撞 + 可上色）
  const deskW = 260, deskH = 110;
  const desks = [
    {x:300, y:250}, {x:760, y:250}, {x:1220, y:250},
    {x:520, y:760}, {x:1080, y:760}
  ];
  desks.forEach(d => {
    solids.push({x:d.x, y:d.y, w:deskW, h:deskH});
    furn.push({type:'desk', x:d.x, y:d.y, w:deskW, h:deskH, base:hexToRgb(COL.nebula), label:'工位'});
  });

  // 三个负能量源（位于前三张桌上）
  sources = [
    { id:'email', name:'焦虑邮件', x:430, y:235, type:'hold', absorbed:false, heal:0,
      desc:'电脑屏幕发出暗红光', hint:'用瞳孔光「烧掉」垃圾邮件' },
    { id:'coffee', name:'咖啡杯残骸', x:890, y:235, type:'hold', absorbed:false, heal:0,
      desc:'洒了一桌的冷咖啡冒着灰烟', hint:'用瞳孔光照射，咖啡渍倒带回杯' },
    { id:'lamp', name:'过劳台灯', x:1350, y:235, type:'rhythm', absorbed:false, heal:0,
      desc:'台灯忽明忽暗、发出嗡嗡声', hint:'按灯闪烁节拍输入' }
  ];

  // 窗台（顶部墙，外面有猫）+ 抽屉（感谢卡）
  furn.push({type:'window', x:760, y:40, w:420, h:90, base:hexToRgb('#0c1230'), label:'窗'});
  furn.push({type:'drawer', x:1480, y:820, w:150, h:120, base:hexToRgb(COL.gray), label:'抽屉'});
  furn.push({type:'rug', x:600, y:520, w:560, h:340, base:hexToRgb('#3a2a66'), label:'地毯'});
  furn.push({type:'vent', x:880, y:120, w:120, h:60, base:hexToRgb(COL.gray), label:'通风口'});

  // 星星糖 x5
  const candyPos = [[640,520],[980,560],[760,860],[1300,640],[420,720]];
  candyPos.forEach(p => candies.push({x:p[0], y:p[1], got:false, t:Math.random()*6}));

  // 美好瞬间
  moments = [
    { id:'cat', name:'窗台上的流浪猫', x:970, y:170, r:120, t:0, done:false,
      text:'窗台外，一只流浪猫在防火梯上伸懒腰。' },
    { id:'card', name:'同事抽屉里的手写感谢卡', x:1555, y:880, r:110, t:0, done:false,
      text:'同事抽屉里，一张手写的感谢卡。原来有人记得你的好。' }
  ];

  starbit = { x:940, y:560, vx:0, vy:0, r:30, face:1, bob:0, walk:0, expr:'standard', exprT:0, mischiefT:0 };
  cam = { x:0, y:0 };
  game = {
    state:'title', // title | play | absorb | cutscene | diary | win
    globalHeal:0,
    energy:0,
    objHeal:0,        // 视觉：场景上色进度（跟随 globalHeal 平滑）
    t:0,
    msg:'', msgT:0,
    cutsceneT:0,
    diaryDone:false,
    absorb:null,
    near:null,        // 当前可交互的负能量源
    win:false
  };
}

function toast(text, dur){ game.msg = text; game.msgT = dur || 3.2; }

/* ---------- 星形瞳孔路径（4 角星，上下长、左右短） ---------- */
function starPath(cx, cy, size, rot){
  const tips = [
    {a:-Math.PI/2, r:size*1.0},
    {a:0,          r:size*0.62},
    {a:Math.PI/2,  r:size*1.0},
    {a:Math.PI,    r:size*0.62}
  ];
  const inner = size*0.34;
  ctx.beginPath();
  for(let i=0;i<4;i++){
    const tip = tips[i];
    const nx = cx + Math.cos(tip.a+rot)*tip.r;
    const ny = cy + Math.sin(tip.a+rot)*tip.r;
    if(i===0) ctx.moveTo(nx,ny); else ctx.lineTo(nx,ny);
    const ia = tip.a + Math.PI/4;
    ctx.lineTo(cx + Math.cos(ia+rot)*inner, cy + Math.sin(ia+rot)*inner);
  }
  ctx.closePath();
}

/* 画一只眼睛（星形瞳孔为唯一 UI） */
function drawEye(cx, cy, size, opt){
  // 眼窝（深空蓝椭圆，让瞳孔更醒目）
  ctx.save();
  ctx.fillStyle = rgbStr(mixRgb(hexToRgb(COL.deep), hexToRgb(COL.gray), 0.4));
  ctx.beginPath();
  ctx.ellipse(cx, cy, size*1.5, size*1.9, 0, 0, Math.PI*2);
  ctx.fill();

  // 光晕
  if(opt.glow > 0){
    const g = ctx.createRadialGradient(cx,cy,0, cx,cy, size*3.2);
    g.addColorStop(0, rgbStr(opt.color, 0.5*opt.glow));
    g.addColorStop(1, rgbStr(opt.color, 0));
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx,cy, size*3.2, 0, Math.PI*2); ctx.fill();
  }
  // 外环（探测/搞怪）
  if(opt.ring){
    ctx.strokeStyle = rgbStr(opt.ring, opt.ringA!==undefined?opt.ringA:0.9);
    ctx.lineWidth = size*0.28;
    ctx.beginPath(); ctx.ellipse(cx, cy, size*1.9, size*2.3, 0, 0, Math.PI*2); ctx.stroke();
  }
  // 星形瞳孔
  const col = hexToRgb(rgbStr(opt.color).length? opt.color : COL.cyan);
  starPath(cx, cy, size*(opt.scale||1), opt.rot||0);
  ctx.fillStyle = opt.color;
  ctx.fill();
  // 中心高光
  ctx.fillStyle = rgbStr(hexToRgb(COL.white), 0.95);
  ctx.beginPath(); ctx.arc(cx, cy, size*0.34, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

/* ---------- 画星崽（IP 图片版） ---------- */
// 图片基础显示尺寸（源图约 500x600，缩放到游戏内约 120x144）
const SB_BASE_W = 120, SB_BASE_H = 144;
function drawStarbit(sx, sy, opt){
  const t = game.t;
  const bob = Math.sin(t*6) * (starbit.walk>0.1 ? 5 : 2);
  const y = sy + bob;
  ctx.save();

  // 移动光迹（霓虹拖尾）
  if(NEON && starbitTrail.length){
    for(let i=0;i<starbitTrail.length;i++){
      const p = starbitTrail[i];
      const f = (i+1)/starbitTrail.length;
      const a = Math.max(0, 0.22*f - (game.t - p.t)*0.04);
      if(a<=0) continue;
      ctx.fillStyle = rgbaStr(COL.cyan, a);
      ctx.beginPath(); ctx.arc(p.x, p.y + Math.sin(game.t*6)*2, 9*f, 0, Math.PI*2); ctx.fill();
    }
  }

  // ===== 表情状态参数 =====
  let exprScale = 1.0;
  let glowColor = COL.cyan;
  let glowAlpha = 0.22;
  let glowSize = 75;
  let tiltAngle = 0;

  if(opt.expr === 'mischief'){
    exprScale = 1.15; glowColor = COL.pink; glowAlpha = 0.35; tiltAngle = 0.12;
  } else if(opt.expr === 'healing'){
    exprScale = 1.12; glowColor = COL.yellow; glowAlpha = 0.40; glowSize = 90;
  } else if(opt.expr === 'detect'){
    const fl = 0.5 + 0.5*Math.sin(t*8);
    glowColor = COL.cyan; glowAlpha = 0.20 + 0.25*fl; glowSize = 70 + 15*fl;
  } else if(opt.expr === 'absorb'){
    const p = opt.absorbProg || 0;
    exprScale = 1 + 0.18*p; glowColor = rgbStr(mixRgb(hexToRgb(COL.cyan), hexToRgb(COL.yellow), p)); glowAlpha = 0.25 + 0.25*p; glowSize = 70 + 20*p;
  } else if(opt.expr === 'sleepy'){
    exprScale = 0.85; glowAlpha = 0.08; glowSize = 55;
  }

  // ===== 外发光（始终可见） =====
  const glowPulse = 0.7 + 0.3*Math.sin(t*3);
  const bodyGlow = ctx.createRadialGradient(sx, y, 8, sx, y, glowSize);
  bodyGlow.addColorStop(0, rgbaStr(glowColor, glowAlpha * glowPulse));
  bodyGlow.addColorStop(0.6, rgbaStr(glowColor, 0.06 * glowPulse));
  bodyGlow.addColorStop(1, rgbaStr(glowColor, 0));
  ctx.fillStyle = bodyGlow;
  ctx.beginPath(); ctx.arc(sx, y, glowSize, 0, Math.PI*2); ctx.fill();

  // 影子
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(sx, sy+48, 32*exprScale, 10*exprScale, 0, 0, Math.PI*2); ctx.fill();

  // 倾斜（移动方向 / 搞怪）
  const lean = clamp(starbit.vx*0.04, -6, 6);

  if(imgReady && starbitImg.complete && starbitImg.naturalWidth > 0){
    // ===== 用 IP 图片绘制 =====
    const dw = SB_BASE_W * exprScale;
    const dh = SB_BASE_H * exprScale;
    ctx.translate(sx + lean * 0.8, y);
    ctx.rotate(tiltAngle + lean * 0.003);
    if(NEON) setGlow(glowColor, 22);
    ctx.drawImage(starbitImg, -dw/2, -dh, dw, dh);
    if(NEON) clearGlow();
  } else {
    // ===== 图片未加载时的回退占位符 =====
    ctx.translate(sx + lean, y);
    const s = 40 * exprScale;
    // 身体
    if(NEON) setGlow(COL.cyan, 16);
    ctx.fillStyle = rgbStr(hexToRgb(COL.nebula));
    roundRect(-s*0.55, -s*0.35, s*1.1, s*0.85, s*0.28); ctx.fill();
    // 头
    ctx.fillStyle = rgbStr(mixRgb(hexToRgb(COL.nebula), hexToRgb(COL.white), 0.15));
    roundRect(-s*0.45, -s*0.95, s*0.9, s*0.65, s*0.22); ctx.fill();
    // 尖角
    ctx.beginPath();
    ctx.moveTo(-s*0.4, -s*0.88); ctx.lineTo(-s*0.62, -s*1.18); ctx.lineTo(-s*0.22, -s*0.82); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(s*0.4, -s*0.88); ctx.lineTo(s*0.62, -s*1.18); ctx.lineTo(s*0.22, -s*0.82); ctx.fill();
    // 眼睛区域提示
    ctx.fillStyle = rgbaStr(glowColor, 0.6 + 0.4*Math.sin(t*6));
    ctx.font = 'bold '+(s*0.35)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('✦', 0, -s*0.55);
    ctx.fillText('✦', s*0.28, -s*0.55);
  }

  if(NEON) clearGlow();
  ctx.restore();
}

function roundRect(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

/* ---------- 颜色工具：对象有效上色度 ---------- */
function objHeal(obj){
  let h = game.objHeal;
  // 星崽暖光局部扩散
  if(starbit){
    const d = dist(starbit.x, starbit.y, obj.x+ (obj.w||0)/2, obj.y+(obj.h||0)/2);
    if(d < AURA_R) h = Math.max(h, 1 - d/AURA_R);
  }
  // 对象自身被吸收后的动画
  if(obj.heal !== undefined) h = Math.max(h, obj.heal);
  return h;
}
function paintColor(base, h){
  return mixRgb(grayify(base), base, h);
}

/* ---------- 更新 ---------- */
function update(dt){
  game.t += dt;
  if(justPressed[' '] || justPressed['enter']) handleConfirm();
  mouse.clicked = false;

  if(game.state === 'title'){ return; }
  if(game.state === 'cutscene'){ updateCutscene(dt); return; }
  if(game.state === 'diary'){ return; }
  if(game.state === 'win'){ updatePlay(dt, true); return; }

  if(game.state === 'absorb'){ updateAbsorb(dt); return; }

  // ---- PLAY ----
  updatePlay(dt, false);

  // 消息计时
  if(game.msgT > 0) game.msgT -= dt;
}

function updatePlay(dt, freeRoam){
  // 触屏摇杆平滑（回弹 / 去抖）：落指与松手都有顺滑过渡
  if(touch.isTouch){
    const k = Math.min(1, dt*20);
    const tx = touch.active ? touch.tAx : 0, ty = touch.active ? touch.tAy : 0;
    touch.ax += (tx - touch.ax)*k;
    touch.ay += (ty - touch.ay)*k;
    const kx = touch.active ? touch.tKx : 0, ky = touch.active ? touch.tKy : 0;
    touch.knobX += (kx - touch.knobX)*k;
    touch.knobY += (ky - touch.knobY)*k;
    if(knobEl) knobEl.style.transform = `translate(${touch.knobX}px, ${touch.knobY}px)`;
  }

  // 移动
  let ax = 0, ay = 0;
  if(keys['a']||keys['arrowleft']) ax -= 1;
  if(keys['d']||keys['arrowright']) ax += 1;
  if(keys['w']||keys['arrowup']) ay -= 1;
  if(keys['s']||keys['arrowdown']) ay += 1;
  // 触屏：直接取带推力大小的向量（推得越远越快）
  if(touch.active){ ax = touch.ax; ay = touch.ay; }

  const dirLen = Math.hypot(ax, ay);
  if(dirLen > 0){
    const ux = ax/dirLen, uy = ay/dirLen;
    const mag = Math.min(1, dirLen);   // 触屏推力大小 → 速度；键盘恒为满速
    starbit.walk = Math.min(1, starbit.walk + dt*4);
    const speed = 230;
    starbit.vx = ux*speed*mag; starbit.vy = uy*speed*mag;
  } else {
    starbit.walk = Math.max(0, starbit.walk - dt*4);
    starbit.vx = 0; starbit.vy = 0;
  }
  starbit.x += starbit.vx*dt;
  starbit.y += starbit.vy*dt;
  if(ax>0.1) starbit.face = 1; else if(ax<-0.1) starbit.face = -1;

  // 房间边界
  starbit.x = clamp(starbit.x, 40, ROOM.w-40);
  starbit.y = clamp(starbit.y, 120, ROOM.h-40);
  // 实体碰撞（桌）
  for(const s of solids){
    const cx = clamp(starbit.x, s.x, s.x+s.w);
    const cy = clamp(starbit.y, s.y-10, s.y+s.h+10);
    const dx = starbit.x-cx, dy = starbit.y-cy;
    const d = Math.hypot(dx,dy);
    if(d < starbit.r){
      const push = starbit.r - d;
      starbit.x += (dx/d)*push; starbit.y += (dy/d)*push;
    }
  }

  // 移动光迹记录
  if(NEON){
    if(Math.hypot(starbit.vx, starbit.vy) > 6){
      starbitTrail.push({x:starbit.x, y:starbit.y, t:game.t});
      if(starbitTrail.length > 16) starbitTrail.shift();
    } else if(starbitTrail.length){
      starbitTrail.shift();
    }
  }

  // 表情：默认 standard；长时间不动 → sleepy；附近有负能量源 → detect
  game.near = null;
  let detect = false;
  for(const so of sources){
    if(so.absorbed) continue;
    const d = dist(starbit.x, starbit.y, so.x, so.y);
    if(d < 150){ detect = true; game.near = (d<90)? so : game.near; }
  }
  if(actionEl) actionEl.classList.toggle('hint', !!game.near);   // 靠近负能量源时按钮脉冲提示
  if(starbit.mischiefT > 0){ starbit.mischiefT -= dt; starbit.expr='mischief'; }
  else if(detect && starbit.walk<0.2) starbit.expr='detect';
  else if(starbit.walk<0.15 && (keys[' ']?false:true)) starbit.expr = (game.t - starbit.bob>3? 'sleepy':'standard');
  else starbit.expr='standard';

  // 星星糖收集
  for(const c of candies){
    if(c.got) continue;
    if(dist(starbit.x, starbit.y, c.x, c.y) < 34){
      c.got = true; game.energy = Math.min(100, game.energy+3);
      Audio2.candy(); spawnParticles(c.x, c.y, hexToRgb(COL.yellow), 10);
      toast('+3 星星糖 · 快乐能量 '+game.energy);
    }
  }
  // 美好瞬间
  for(const m of moments){
    if(m.done) continue;
    const d = dist(starbit.x, starbit.y, m.x, m.y);
    if(d < m.r){ m.t += dt; if(m.t > 4){ m.done=true; game.energy=Math.min(100,game.energy+5);
      Audio2.chime(); spawnParticles(m.x,m.y,hexToRgb(COL.white),14); toast('美好瞬间：'+m.text); } }
    else m.t = Math.max(0, m.t - dt*0.5);
  }

  // 胜利判定
  if(!game.win && sources.every(s=>s.absorbed)){
    game.win = true;
    setTimeout(()=>{ if(game.state==='play'){ game.state='cutscene'; game.cutsceneT=0; } }, 1100);
  }

  // 相机
  cam.x = clamp(starbit.x - W/2, 0, Math.max(0, ROOM.w - W));
  cam.y = clamp(starbit.y - H/2, 0, Math.max(0, ROOM.h - H));
  if(ROOM.w < W) cam.x = (ROOM.w - W)/2;
  if(ROOM.h < H) cam.y = (ROOM.h - H)/2;

  // 平滑场景上色
  game.objHeal = lerp(game.objHeal, game.globalHeal, dt*1.2);
  // 星光粒子更新
  updateParticles(dt);
}

function handleConfirm(){
  if(game.state === 'title'){ Audio2.init(); game.state='play'; toast('用 WASD / 方向键 移动星崽，靠近暗红光的物件按 空格 吸收', 5); var ov=document.getElementById('startOverlay'); if(ov) ov.style.display='none'; return; }
  if(game.state === 'diary'){ game.state='play'; game.objHeal=1; game.globalHeal=1; toast('本章完成：深夜办公室 · 你可以继续探索收集星星糖', 5); return; }
  if(game.state === 'cutscene'){
    if(game.cutsceneT > 3){ game.state='diary'; }
    return;
  }
  if(game.state === 'play' || game.state === 'win'){
    if(game.near && !game.near.absorbed){ startAbsorb(game.near); }
  }
  if(game.state === 'absorb'){ /* 空格用于吸收动作，不重复触发 */ }
}

/* ---------- 吸收小游戏 ---------- */
function startAbsorb(so){
  game.state = 'absorb';
  game.absorb = { target:so, type:so.type, prog:0, t:0, beats:[], adTimer:0, ads:[], flash:0 };
  Audio2.detect();
  toast('吸收「'+so.name+'」：'+so.hint, 4);
}
function updateAbsorb(dt){
  const a = game.absorb; if(!a) return;
  a.t += dt; a.flash = Math.max(0, a.flash - dt*3);
  if(a.type === 'rhythm'){
    // 节拍器
    const interval = 0.85;
    const phase = (a.t % interval) / interval;
    a.beatPhase = phase;
    // 玩家在节拍点附近按空格
    if(justPressed[' ']){
      const near = Math.min(phase, 1-phase);
      if(near < 0.18){ a.prog += 0.22; a.flash = 1; Audio2.beat(); spawnParticles(a.target.x,a.target.y,hexToRgb(COL.yellow),6); }
      else { a.prog = Math.max(0, a.prog-0.04); }
      justPressed[' '] = false;
    }
  } else { // hold
    if(keys[' '] || touch.confirmHeld){ a.prog += dt/3.0; a.flash = 1; if(Math.random()<0.3) Audio2.absorbStep();
      if(Math.random()<0.4) spawnParticles(a.target.x+rand(-20,20), a.target.y+rand(-10,10), hexToRgb(COL.cyan), 2); }
    // 邮件：点击弹窗广告额外加速
    if(a.target.id==='email' && mouse.clicked){
      for(const ad of a.ads){
        if(dist(mouse.x+ cam.x, mouse.y+cam.y, ad.x, ad.y) < 26){
          ad.dead = true; a.prog += 0.06; Audio2.absorbStep();
        }
      }
    }
    if(a.target.id==='email'){
      a.adTimer -= dt;
      if(a.adTimer <= 0){ a.adTimer = rand(0.5,1.1);
        a.ads.push({x:a.target.x+rand(-60,60), y:a.target.y+rand(-40,40), t:0, dead:false}); }
    }
    a.ads = a.ads.filter(ad=>!ad.dead && (ad.t+=dt)<2.5);
  }
  a.prog = clamp(a.prog, 0, 1);
  if(a.prog >= 1) completeAbsorb(a.target);
}
function completeAbsorb(so){
  so.absorbed = true;
  so.heal = 0; // 动画升到 1
  game.energy = Math.min(100, game.energy+20);
  game.globalHeal = clamp(game.globalHeal + 1/3, 0, 1);
  Audio2.heal();
  spawnParticles(so.x, so.y, hexToRgb(COL.yellow), 26);
  starbit.mischiefT = 2.2; // 吸收后搞怪一下
  toast('「'+so.name+'」已转化 · 快乐能量 '+game.energy, 3.5);
  game.state='play';
  game.absorb=null;
}

/* ---------- 章节高潮过场：键盘舞者 ---------- */
function updateCutscene(dt){
  game.cutsceneT += dt;
  updateParticles(dt);
  if(game.cutsceneT > 3 && (justPressed[' ']||justPressed['enter'])){ game.state='diary'; }
}
function drawCutscene(){
  // 暗场
  ctx.fillStyle = rgbStr(hexToRgb(COL.deep), 0.55);
  ctx.fillRect(0,0,W,H);
  const cx = W/2, cy = H/2;
  // 星崽在键盘上跳舞
  const dance = Math.sin(game.cutsceneT*10);
  drawStarbit(cx, cy+60, {expr:'mischief'});
  // 音符 & ❤
  ctx.fillStyle = COL.pink; ctx.font='bold 34px sans-serif';
  ctx.fillText('♥', cx + dance*60 + 40, cy - 60 + Math.sin(game.cutsceneT*5)*10);
  // 屏幕上乱码邮件
  ctx.fillStyle = rgbStr(hexToRgb(COL.cyan), 0.9);
  ctx.font='14px monospace';
  ctx.fillText('a8f*&^%#$  ❤', cx-50, cy-120);
  // 时钟 3:33
  ctx.fillStyle = COL.white; ctx.font='bold 22px monospace';
  ctx.fillText('03:33', cx+120, cy-90);
  // 文案
  ctx.fillStyle = COL.white; ctx.font='16px sans-serif'; ctx.textAlign='center';
  ctx.fillText('星崽跳上键盘，踩出一封满是乱码的邮件——结尾只有一个 ♥。', cx, cy+180);
  ctx.fillText('时针悄悄跳到了凌晨 3:33。', cx, cy+206);
  if(game.cutsceneT > 3){
    ctx.fillStyle = rgbStr(hexToRgb(COL.yellow), 0.6+0.4*Math.sin(game.cutsceneT*4));
    ctx.fillText('按 空格 查看星崽日记', cx, cy+250);
  }
  ctx.textAlign='left';
}

/* ---------- 星崽日记 ---------- */
const DIARY = `星崽日记 #1 · 深夜办公室
地球时间：凌晨 3:33

这里的「打工人」会在深夜独自亮着一盏屏幕。
他们说这叫「加班」，但我看，更像是一种……安静的等待。

我把那个冒红光的邮件烧掉了。屏幕亮起来的时候，
他盯着蓝天壁纸看了很久，肩膀悄悄松了一点。

原来治愈一个人，有时候只需要让他看见一点蓝色。

—— 压力给我，快乐给你。 ♥`;

function drawDiary(){
  ctx.fillStyle = rgbStr(hexToRgb(COL.deep), 0.7); ctx.fillRect(0,0,W,H);
  const pw = Math.min(640, W-80), ph = 360, px=(W-pw)/2, py=(H-ph)/2;
  ctx.fillStyle = rgbStr(hexToRgb('#f3ecff'));
  roundRect(px,py,pw,ph,18); ctx.fill();
  // 星形 LOGO
  starPath(px+40, py+44, 18, 0); ctx.fillStyle = COL.cyan; ctx.fill();
  ctx.fillStyle = COL.deep; ctx.font='bold 20px sans-serif'; ctx.textAlign='left';
  ctx.fillText('星崽日记', px+72, py+52);
  ctx.fillStyle = '#333'; ctx.font='15px sans-serif';
  const lines = DIARY.split('\n');
  lines.forEach((l,i)=> ctx.fillText(l, px+40, py+96 + i*26));
  ctx.fillStyle = COL.pink; ctx.font='15px sans-serif';
  ctx.fillText('按 空格 返回', px+pw-110, py+ph-22);
}

/* ---------- 粒子 ---------- */
function spawnParticles(x,y,col,n){
  for(let i=0;i<n;i++){
    const a = rand(0,Math.PI*2), sp = rand(20,90);
    particles.push({x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-20, life:rand(0.6,1.4), max:1.4, col});
  }
}
function updateParticles(dt){
  for(const p of particles){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=40*dt; p.life-=dt; }
  particles = particles.filter(p=>p.life>0);
}

/* ---------- 霓虹混搭风格：发光网格 / 暗角辉光 ---------- */
function drawNeonGrid(){
  if(!NEON) return;
  ctx.save();
  ctx.strokeStyle = rgbaStr(COL.cyan, 0.06);
  ctx.lineWidth = 1;
  ctx.beginPath();
  for(let gx=0; gx<=ROOM.w; gx+=80){ ctx.moveTo(gx,0); ctx.lineTo(gx,ROOM.h); }
  for(let gy=0; gy<=ROOM.h; gy+=80){ ctx.moveTo(0,gy); ctx.lineTo(ROOM.w,gy); }
  ctx.stroke();
  ctx.fillStyle = rgbaStr(COL.cyan, 0.10);
  for(let gx=0; gx<=ROOM.w; gx+=160){
    for(let gy=0; gy<=ROOM.h; gy+=160){ ctx.fillRect(gx-1, gy-1, 2, 2); }
  }
  ctx.restore();
}
function drawNeonVignette(){
  if(!NEON) return;
  let g = ctx.createRadialGradient(W/2, H+120, 60, W/2, H+120, H*0.9);
  g.addColorStop(0, rgbaStr(COL.cyan, 0.12));
  g.addColorStop(1, rgbaStr(COL.cyan, 0));
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  g = ctx.createRadialGradient(W/2, -120, 60, W/2, -120, H*0.7);
  g.addColorStop(0, rgbaStr(COL.pink, 0.10));
  g.addColorStop(1, rgbaStr(COL.pink, 0));
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  g = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.35, W/2, H/2, Math.max(W,H)*0.75);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
}

/* ---------- 渲染：场景 ---------- */
function drawWorld(){
  ctx.save();
  ctx.translate(-cam.x, -cam.y);

  // 背景：优先使用 AI 生成的场景概念图；否则回退到矢量房间
  const heal = game.energy/100;
  const HAS_BG = sceneReady;
  if(HAS_BG){
    // 整间办公室铺满场景图
    drawImageCover(sceneImg, ROOM.x, ROOM.y, ROOM.w, ROOM.h);
    // 治愈前覆盖一层冷暗色，快乐能量越高越透明（还原"从灰暗变彩色"机制）
    const a = (1-heal)*0.72;
    ctx.fillStyle = rgbStr([10,10,26], a);
    ctx.fillRect(ROOM.x, ROOM.y, ROOM.w, ROOM.h);
  } else {
    // 地板
    const floorH = objHeal({x:0,y:0,w:ROOM.w,h:ROOM.h});
    ctx.fillStyle = rgbStr(paintColor(hexToRgb('#23234a'), floorH));
    ctx.fillRect(ROOM.x, ROOM.y, ROOM.w, ROOM.h);
    // 地砖网格
    ctx.strokeStyle = rgbStr(paintColor(hexToRgb(COL.gray), floorH), 0.5);
    ctx.lineWidth = 2;
    for(let gx=0; gx<=ROOM.w; gx+=80){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,ROOM.h); ctx.stroke(); }
    for(let gy=0; gy<=ROOM.h; gy+=80){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(ROOM.w,gy); ctx.stroke(); }

    // 墙（上、左右）
    ctx.fillStyle = rgbStr(paintColor(hexToRgb('#15152e'), floorH));
    ctx.fillRect(0,0,ROOM.w,110); // 顶墙（含窗）
    ctx.fillRect(0,0,40,ROOM.h); ctx.fillRect(ROOM.w-40,0,40,ROOM.h);
  }

  drawNeonGrid();

  // 家具（使用场景图时跳过，避免与背景图重复）
  if(!HAS_BG) for(const f of furn){
    const h = objHeal(f);
    if(f.type==='window'){
      // 窗外夜空 → 治愈后星空
      const g = ctx.createLinearGradient(0, f.y, 0, f.y+f.h);
      g.addColorStop(0, rgbStr(paintColor(hexToRgb('#0a0f2a'), h)));
      g.addColorStop(1, rgbStr(paintColor(hexToRgb('#1a2350'), h)));
      ctx.fillStyle = g; ctx.fillRect(f.x,f.y,f.w,f.h);
      if(h>0.4){ // 星星
        ctx.fillStyle = rgbStr(hexToRgb(COL.white), (h-0.4));
        for(let i=0;i<14;i++){ const sx=f.x+10+i*28%f.w, sy=f.y+10+ (i*37%(f.h-20)); ctx.fillRect(sx,sy,2,2); }
      }
      ctx.strokeStyle = rgbStr(paintColor(hexToRgb(COL.gray), h)); ctx.lineWidth=6;
      ctx.strokeRect(f.x,f.y,f.w,f.h);
    } else if(f.type==='rug'){
      ctx.fillStyle = rgbStr(paintColor(f.base, h));
      roundRect(f.x,f.y,f.w,f.h,18); ctx.fill();
    } else if(f.type==='vent'){
      ctx.fillStyle = rgbStr(paintColor(f.base, h));
      roundRect(f.x,f.y,f.w,f.h,6); ctx.fill();
    } else if(f.type==='drawer'){
      ctx.fillStyle = rgbStr(paintColor(f.base, h));
      roundRect(f.x,f.y,f.w,f.h,8); ctx.fill();
      ctx.strokeStyle = rgbStr(paintColor(hexToRgb(COL.cyan), h), 0.6); ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(f.x+10,f.y+f.h/2); ctx.lineTo(f.x+f.w-10,f.y+f.h/2); ctx.stroke();
    } else { // desk
      ctx.fillStyle = rgbStr(paintColor(f.base, h));
      roundRect(f.x,f.y,f.w,f.h,10); ctx.fill();
      ctx.fillStyle = rgbStr(paintColor(hexToRgb(COL.deep), h), 0.4);
      roundRect(f.x+10,f.y+8,f.w-20,16,6); ctx.fill();
    }
  }

  // 负能量源
  for(const so of sources){
    const h = so.heal;
    // 桌上屏幕/物件底座
    if(so.id==='email'){
      ctx.fillStyle = rgbStr(paintColor(hexToRgb('#101830'), h));
      roundRect(so.x-50, so.y-30, 100, 60, 6); ctx.fill();
      if(!so.absorbed){
        // 暗红发光
        const gl = 0.5+0.5*Math.sin(game.t*5);
        ctx.fillStyle = rgbStr(hexToRgb('#ff3b5c'), 0.35+0.3*gl);
        ctx.fillRect(so.x-44, so.y-24, 88, 48);
        ctx.fillStyle = rgbStr(hexToRgb('#ff6b8a'), 0.6+0.3*gl);
        ctx.font='10px monospace'; ctx.fillText('NEW MAIL', so.x-40, so.y-8);
      } else {
        // 治愈后蓝天壁纸
        const g = ctx.createLinearGradient(so.x-44,so.y-24,so.x+44,so.y+24);
        g.addColorStop(0, rgbStr(mixRgb(hexToRgb('#7ec8ff'),hexToRgb('#bfe9ff'),h)));
        g.addColorStop(1, rgbStr(mixRgb(hexToRgb('#3a86c8'),hexToRgb('#e8f6ff'),h)));
        ctx.fillStyle = g; ctx.fillRect(so.x-44, so.y-24, 88, 48);
      }
    } else if(so.id==='coffee'){
      ctx.fillStyle = rgbStr(paintColor(hexToRgb('#2a2440'), h));
      roundRect(so.x-18, so.y-14, 36, 28, 6); ctx.fill();
      if(!so.absorbed){
        const gl=0.5+0.5*Math.sin(game.t*4);
        ctx.fillStyle = rgbStr(hexToRgb('#6b6478'), 0.5+0.3*gl);
        ctx.beginPath(); ctx.arc(so.x, so.y-14, 14, Math.PI, 0); ctx.fill(); // 灰烟
        ctx.fillStyle = rgbStr(hexToRgb('#4a4458'), 0.6);
        ctx.beginPath(); ctx.ellipse(so.x, so.y+4, 16, 5, 0, 0, Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle = rgbStr(mixRgb(hexToRgb('#3a2a1a'),hexToRgb('#caa06a'),h));
        ctx.beginPath(); ctx.ellipse(so.x, so.y+4, 14, 5, 0, 0, Math.PI*2); ctx.fill();
        // 热气
        ctx.strokeStyle = rgbStr(hexToRgb(COL.white), 0.4*h); ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(so.x, so.y-18, 6, Math.PI, 0); ctx.stroke();
      }
    } else if(so.id==='lamp'){
      // 灯杆
      ctx.strokeStyle = rgbStr(paintColor(hexToRgb(COL.gray), h)); ctx.lineWidth=5;
      ctx.beginPath(); ctx.moveTo(so.x, so.y+20); ctx.lineTo(so.x, so.y-30); ctx.stroke();
      if(!so.absorbed){
        const gl=0.5+0.5*Math.sin(game.t*9);
        ctx.fillStyle = rgbStr(hexToRgb('#ffd98a'), 0.3+0.4*gl);
        ctx.beginPath(); ctx.arc(so.x, so.y-34, 16, 0, Math.PI*2); ctx.fill();
      } else {
        const gl=0.7+0.3*Math.sin(game.t*2);
        ctx.fillStyle = rgbStr(hexToRgb(COL.yellow), gl);
        ctx.beginPath(); ctx.arc(so.x, so.y-34, 18, 0, Math.PI*2); ctx.fill();
        // 暖光锥
        const g = ctx.createRadialGradient(so.x,so.y-34,0, so.x,so.y-34,120);
        g.addColorStop(0, rgbStr(hexToRgb(COL.yellow), 0.25));
        g.addColorStop(1, rgbStr(hexToRgb(COL.yellow), 0));
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(so.x,so.y-34,120,0,Math.PI*2); ctx.fill();
      }
    }
  }

  // 负能量源：霓虹光环（仿街机发光球）
  if(NEON){
    for(const so of sources){
      if(so.absorbed) continue;
      const fl = 0.5 + 0.5*Math.sin(game.t*4);
      ctx.save();
      setGlow(COL.pink, 18);
      ctx.strokeStyle = rgbaStr(COL.pink, 0.45 + 0.3*fl);
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(so.x, so.y-6, 42 + 4*fl, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    }
  }

  // 星星糖
  for(const c of candies){
    if(c.got) continue;
    const pulse = 1+0.15*Math.sin(game.t*4+c.t);
    ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(game.t*0.8);
    if(NEON) setGlow(COL.yellow, 12);
    starPath(0,0,12*pulse,0); ctx.fillStyle = COL.yellow; ctx.fill();
    ctx.fillStyle = rgbStr(hexToRgb(COL.white),0.9); ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
    if(NEON) clearGlow();
    ctx.restore();
  }

  // 美好瞬间提示（隐约光点）
  for(const m of moments){
    if(m.done) continue;
    const a = 0.15+0.15*Math.sin(game.t*2);
    ctx.fillStyle = rgbStr(hexToRgb(COL.white), a);
    ctx.beginPath(); ctx.arc(m.x, m.y, 6, 0, Math.PI*2); ctx.fill();
  }

  // 粒子
  for(const p of particles){
    ctx.fillStyle = rgbStr(p.col, p.life/p.max);
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
  }

  // 星崽
  let expr = starbit.expr;
  if(game.near) expr = 'detect';
  drawStarbit(starbit.x, starbit.y, {expr});

  ctx.restore();
}

/* ---------- HUD（瞳孔即 UI） ---------- */
function drawHUD(){
  // 顶部瞳孔眼睛（唯一 UI）
  const cx = W/2, ey = 56;
  let leftOpt, rightOpt;
  const e = starbit.expr;
  const fullGlow = game.energy>=80 ? 0.6+0.4*Math.sin(game.t*4) : 0;
  if(e==='mischief'){
    leftOpt={color:COL.pink,size:15*1.3,scale:1.3,rot:0.2,ring:hexToRgb(COL.pink),glow:0.7+fullGlow};
    rightOpt={color:COL.cyan,size:15*0.7,scale:0.7,rot:-0.2,glow:0.3};
  } else if(e==='healing'){
    leftOpt=rightOpt={color:COL.yellow,size:15*1.15,scale:1.15,rot:0,glow:0.7+fullGlow};
  } else if(e==='detect'){
    const fl=0.5+0.5*Math.sin(game.t*8);
    leftOpt=rightOpt={color:COL.cyan,size:15,scale:1,rot:game.t*0.5,ring:hexToRgb(COL.pink),ringA:0.4+0.5*fl,glow:0.35+0.4*fl+fullGlow*0.3};
  } else if(e==='sleepy'){
    leftOpt=rightOpt={color:rgbStr(mixRgb(hexToRgb(COL.cyan),hexToRgb(COL.gray),0.7)),size:15*0.6,scale:0.6,rot:0,glow:0.1};
  } else {
    leftOpt=rightOpt={color:COL.cyan,size:15,scale:1,rot:0,glow:0.4+fullGlow};
  }
  drawEye(cx-40, ey, leftOpt.size, leftOpt);
  drawEye(cx+40, ey, rightOpt.size, rightOpt);

  // 左下：霓虹能量条
  if(NEON){
    const bx=18, by=H-58, bw=190, bh=12;
    ctx.save();
    setGlow(COL.cyan, 10);
    ctx.strokeStyle = rgbaStr(COL.cyan, 0.85); ctx.lineWidth=1.5;
    roundRect(bx, by, bw, bh, 6); ctx.stroke();
    const fw = bw * (game.energy/100);
    if(fw>2){
      const g = ctx.createLinearGradient(bx, 0, bx+bw, 0);
      g.addColorStop(0, COL.cyan); g.addColorStop(1, COL.pink);
      ctx.fillStyle = g; roundRect(bx, by, fw, bh, 6); ctx.fill();
    }
    clearGlow();
    ctx.restore();
  }
  // 左下：能量与进度（霓虹发光字）
  ctx.save();
  if(NEON) setGlow(COL.cyan, 6);
  ctx.fillStyle = rgbStr(hexToRgb(COL.white), 0.9);
  ctx.font = '13px sans-serif'; ctx.textAlign='left';
  ctx.fillText('快乐能量 '+game.energy+'/100', 18, H-24);
  const got = sources.filter(s=>s.absorbed).length;
  ctx.fillText('负能量源 '+got+'/3   星星糖 '+candies.filter(c=>c.got).length+'/5', 18, H-40);
  ctx.restore();
  ctx.textAlign='left';

  // 底部提示
  if(game.msgT>0){
    const a = clamp(game.msgT, 0, 1);
    ctx.fillStyle = rgbStr(hexToRgb(COL.deep), 0.7*a);
    const tw = ctx.measureText(game.msg).width;
    const bw = Math.max(tw, 200)+40;
    roundRect(W/2-bw/2, H-92, bw, 34, 10); ctx.fill();
    ctx.fillStyle = rgbStr(hexToRgb(COL.white), a);
    ctx.font='14px sans-serif'; ctx.textAlign='center';
    ctx.fillText(game.msg, W/2, H-70);
    ctx.textAlign='left';
  }
  // 靠近可交互提示
  if(game.near && !game.near.absorbed && game.state==='play'){
    ctx.fillStyle = COL.yellow; ctx.font='15px sans-serif'; ctx.textAlign='center';
    ctx.fillText('按 空格 吸收「'+game.near.name+'」', W/2, H-120);
    ctx.textAlign='left';
  }
}

/* ---------- 吸收小游戏界面 ---------- */
function drawAbsorb(){
  const a = game.absorb; const so = a.target;
  // 暗化世界
  ctx.fillStyle = rgbStr(hexToRgb(COL.deep), 0.6); ctx.fillRect(0,0,W,H);
  const px=W/2, py=H/2;
  // 面板
  const pw=420, ph=240, bx=px-pw/2, by=py-ph/2;
  ctx.fillStyle = rgbStr(hexToRgb('#1d1d40'), 0.95);
  roundRect(bx,by,pw,ph,16); ctx.fill();
  if(NEON) setGlow(COL.cyan, 16);
  ctx.strokeStyle = COL.cyan; ctx.lineWidth=2; roundRect(bx,by,pw,ph,16); ctx.stroke();
  if(NEON) clearGlow();

  ctx.fillStyle = COL.white; ctx.font='bold 18px sans-serif'; ctx.textAlign='center';
  ctx.fillText('吸收「'+so.name+'」', px, by+34);
  ctx.fillStyle = rgbStr(hexToRgb(COL.cyan),0.9); ctx.font='13px sans-serif';
  ctx.fillText(so.hint, px, by+58);

  // 进度环
  ctx.save(); ctx.translate(px, py+40);
  ctx.strokeStyle = rgbStr(hexToRgb(COL.gray)); ctx.lineWidth=14;
  ctx.beginPath(); ctx.arc(0,0,46,0,Math.PI*2); ctx.stroke();
  const col = (()=>{ const c=mixRgb(hexToRgb(COL.cyan),hexToRgb(COL.yellow),a.prog); return rgbStr(c); })();
  ctx.strokeStyle = col; ctx.lineWidth=14; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0,0,46,-Math.PI/2, -Math.PI/2 + a.prog*Math.PI*2); ctx.stroke();
  ctx.restore();
  ctx.fillStyle = COL.white; ctx.font='bold 20px monospace'; ctx.textAlign='center';
  ctx.fillText(Math.round(a.prog*100)+'%', px, py+48);

  // 类型提示
  ctx.fillStyle = rgbStr(hexToRgb(COL.yellow), 0.9); ctx.font='14px sans-serif';
  if(a.type==='rhythm'){
    // 节拍指示
    const ph = a.beatPhase||0;
    const bx2 = px-90;
    for(let i=0;i<5;i++){
      const seg = bx2 + i*45;
      const on = Math.abs(((i/5) - ph + 1)%1) < 0.12 || Math.abs(((i/5)-ph))<0.12;
      ctx.fillStyle = on ? COL.pink : rgbStr(hexToRgb(COL.gray));
      ctx.beginPath(); ctx.arc(seg, py+110, 7, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = COL.white; ctx.fillText('跟着节拍按 空格', px, py+150);
  } else {
    ctx.fillText('按住 空格 持续输出瞳孔光', px, py+120);
  }
  ctx.textAlign='left';
}

/* ---------- 标题页 ---------- */
function drawTitle(){
  // 背景星云渐变
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, COL.deep);
  g.addColorStop(1, COL.nebula);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  // 星点
  ctx.fillStyle = rgbStr(hexToRgb(COL.white),0.5);
  for(let i=0;i<60;i++){ const x=(i*97)%W, y=(i*53)%H; ctx.fillRect(x,y,2,2); }
  // 霓虹地平线网格（屏幕底部，仿街机透视地面）
  if(NEON){
    ctx.save();
    ctx.strokeStyle = rgbaStr(COL.cyan, 0.18); ctx.lineWidth = 1;
    const horizon = H*0.86, vpx = W/2;
    ctx.beginPath();
    for(let i=-10;i<=10;i++){ ctx.moveTo(vpx, horizon); ctx.lineTo(vpx + i*W*0.12, H); }
    for(let j=0;j<6;j++){ const y=horizon + (H-horizon)*(j/6); ctx.moveTo(0,y); ctx.lineTo(W,y); }
    ctx.stroke();
    ctx.restore();
  }

  // 动画星崽（AI 生成的待机动画）作为主视觉
  const vx=cx, vy=H*0.30, vs=190;
  if(charVideoReady && charVideo.readyState>=2){
    tryPlayCharVideo();
    const vp = 1+0.05*Math.sin(game.t*3);
    ctx.save();
    ctx.shadowColor = rgbStr(hexToRgb(COL.cyan),0.55); ctx.shadowBlur=28;
    ctx.drawImage(charVideo, vx-vs/2*vp, vy-vs/2*vp, vs*vp, vs*vp);
    ctx.restore();
  } else {
    // 回退：星形 LOGO
    const pulse = 1+0.08*Math.sin(game.t*3);
    ctx.save(); ctx.translate(vx,vy); ctx.scale(pulse,pulse);
    const lg = ctx.createRadialGradient(0,0,0,0,0,70);
    lg.addColorStop(0, rgbStr(hexToRgb(COL.cyan),0.4)); lg.addColorStop(1, rgbStr(hexToRgb(COL.cyan),0));
    ctx.fillStyle=lg; ctx.beginPath(); ctx.arc(0,0,70,0,Math.PI*2); ctx.fill();
    starPath(0,0,40,0); ctx.fillStyle=COL.cyan; ctx.fill();
    ctx.fillStyle=COL.pink; ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  ctx.textAlign='center';
  if(NEON) setGlow(COL.cyan, 24);
  ctx.fillStyle = COL.white; ctx.font='bold 40px sans-serif';
  ctx.fillText('星际治愈者 · 星崽', cx, H*0.52);
  if(NEON) clearGlow();
  ctx.fillStyle = rgbStr(hexToRgb(COL.cyan)); ctx.font='16px sans-serif';
  ctx.fillText('STARBIT · Glimmer in the Dark', cx, H*0.52+28);
  ctx.fillStyle = rgbStr(hexToRgb(COL.white),0.85); ctx.font='15px sans-serif';
  ctx.fillText('一款没有嘴巴的外星人，比任何人都懂你的情绪。', cx, H*0.52+60);
  ctx.fillText('Chapter 1 垂直切片 · 深夜办公室', cx, H*0.52+84);

  const blink = 0.5+0.5*Math.sin(game.t*4);
  ctx.fillStyle = rgbStr(hexToRgb(COL.yellow), blink);
  ctx.font='bold 20px sans-serif';
  ctx.fillText('按 空格 / 点击 开始', cx, H*0.74);

  ctx.fillStyle = rgbStr(hexToRgb(COL.white),0.6); ctx.font='13px sans-serif';
  ctx.fillText('WASD / 方向键 移动 · 空格 吸收负能量 · 收集星星糖与美好瞬间', cx, H*0.82);
  ctx.textAlign='left';
}

/* ---------- 主渲染 ---------- */
function render(){
  ctx.clearRect(0,0,W,H);
  if(game.state==='title'){ drawTitle(); return; }

  drawWorld();
  drawNeonVignette();
  drawHUD();

  if(game.state==='absorb') drawAbsorb();
  if(game.state==='cutscene') drawCutscene();
  if(game.state==='diary'){ drawDiary(); }
  if(game.state==='win'){ /* win 态也是 play，已处理 */ }
}

/* ---------- 主循环 ---------- */
let last = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now-last)/1000);
  last = now;
  update(dt);
  render();
  // 清空 justPressed
  for(const k in justPressed) justPressed[k] = false;
  requestAnimationFrame(loop);
}

/* ---------- 启动 ---------- */
function start(){
  resize();
  buildLevel();
  window.__starbitReady = true;
  var l = document.getElementById('loading'); if(l) l.style.display='none';
  var sb = document.getElementById('startBtn'); if(sb) sb.addEventListener('click', window.__startGame);
  var b = document.getElementById('brand'); if(b) b.classList.add('on');
  if(touch.isTouch) document.body.classList.add('touch');
  setupTouchUI();
  requestAnimationFrame(loop);
}
window.__startGame = function(){
  Audio2.init();
  tryPlayCharVideo();
  if(!game) return;
  if(game.state==='title'){ game.state='play';
    if(touch.isTouch){ toast('左下摇杆移动 · 右下「吸收」按钮互动', 5);
      var th=document.getElementById('touchHint'); if(th){ th.classList.add('show'); setTimeout(function(){ th.classList.remove('show'); }, 3500); } }
    else { toast('用 WASD / 方向键 移动星崽，靠近暗红光的物件按 空格 吸收', 5); } }
  else if(game.state==='diary'){ game.state='play'; game.objHeal=1; game.globalHeal=1; toast('本章完成：深夜办公室 · 你可以继续探索收集星星糖', 5); }
  else if(game.state==='cutscene'){ game.state='diary'; }
  if(canvas && canvas.focus) canvas.focus();
  var ov = document.getElementById('startOverlay'); if(ov) ov.style.display='none';
};
start();

</script>

  <script>
    // 兜底：5 秒后若脚本未初始化，提示用户用浏览器直接打开本文件
    setTimeout(function(){
      if(!window.__starbitReady){
        var ov=document.getElementById('startOverlay');
        if(ov){ ov.querySelector('.desc').innerHTML='似乎脚本未能加载。<br/>请用 Chrome / Safari 直接打开本 HTML 文件（双击即可），或确认 index.html 与 game.js 在同一目录。'; }
      }
    }, 5000);
  </script>
